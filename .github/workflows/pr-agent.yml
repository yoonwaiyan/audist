name: PR Agent
# Comment-triggered only — no automatic run on PR open/push. Comment a slash
# command (e.g. /review, /improve, /describe, /ask) on a PR to invoke it manually.
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

jobs:
  pr_agent_job:
    # Without this, PR-Agent's own comments (posted via GITHUB_TOKEN) would
    # re-trigger this workflow indefinitely.
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
    - name: PR Agent action step
      uses: the-pr-agent/pr-agent@v0.38.0
      env:
        OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
