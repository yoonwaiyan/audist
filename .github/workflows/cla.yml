name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
       github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: .github/cla-signatures.json
          path-to-document: https://github.com/yoonwaiyan/audist/blob/main/CLA_INDIVIDUAL.md
          branch: main
          allowlist: yoonwaiyan
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this pull request,
            we need you to sign the **Audist Individual Contributor License Agreement (CLA)**.

            Please read the [CLA document](https://github.com/yoonwaiyan/audist/blob/main/CLA_INDIVIDUAL.md),
            then sign by posting the following comment:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you!
