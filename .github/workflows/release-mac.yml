name: Release macOS

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

# Opt into Node.js 24 for GitHub Actions runners ahead of the June 2026 deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Whisper binary
        run: node scripts/prepare-whisper.mjs

      - name: Build Electron app (macOS)
        # CSC_IDENTITY_AUTO_DISCOVERY=false produces an unsigned build.
        # To enable code signing, add CSC_LINK (base-64 .p12) and
        # CSC_KEY_PASSWORD as repository secrets and remove that env var.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-vite build && npx electron-builder --mac --config.mac.identity=null

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: audist-mac-${{ github.ref_name }}
          path: dist/*.dmg
          retention-days: 30
