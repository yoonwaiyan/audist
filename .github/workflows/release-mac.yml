name: Release macOS

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

# Opt into Node.js 24 for GitHub Actions runners ahead of the June 2026 deadline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Whisper binary
        run: node scripts/prepare-whisper.mjs

      - name: Generate build/icon.icns from resources/icon.png
        run: |
          mkdir -p /tmp/audist.iconset
          for size in 16 32 64 128 256 512 1024; do
            sips -z $size $size resources/icon.png --out /tmp/audist.iconset/icon_${size}x${size}.png
          done
          # Retina variants
          cp /tmp/audist.iconset/icon_32x32.png   /tmp/audist.iconset/icon_16x16@2x.png
          cp /tmp/audist.iconset/icon_64x64.png   /tmp/audist.iconset/icon_32x32@2x.png
          cp /tmp/audist.iconset/icon_256x256.png /tmp/audist.iconset/icon_128x128@2x.png
          cp /tmp/audist.iconset/icon_512x512.png /tmp/audist.iconset/icon_256x256@2x.png
          cp /tmp/audist.iconset/icon_1024x1024.png /tmp/audist.iconset/icon_512x512@2x.png
          iconutil -c icns /tmp/audist.iconset -o build/icon.icns

      - name: Build Electron app (macOS)
        # Code signing is enabled automatically when CSC_LINK and CSC_KEY_PASSWORD
        # repository secrets are present. Without them the build is unsigned
        # (CSC_IDENTITY_AUTO_DISCOVERY=false) and suitable for internal testing only.
        #
        # To enable signing:
        #   1. Export your Apple Developer certificate as a .p12 file
        #   2. Base-64 encode it: base64 -i cert.p12 | tr -d '\n'
        #   3. Add CSC_LINK (the encoded cert) and CSC_KEY_PASSWORD as repo secrets
        #
        # To enable notarization after signing:
        #   Set notarize: true in electron-builder.yml and add secrets:
        #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx electron-vite build
          if [ -n "$CSC_LINK" ]; then
            npx electron-builder --mac
          else
            npx electron-builder --mac --config.mac.identity=null
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: audist-mac-${{ github.ref_name }}
          path: dist/*.dmg
          retention-days: 30

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: true
